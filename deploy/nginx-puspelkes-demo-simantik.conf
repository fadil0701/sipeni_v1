# Reverse proxy VM — puspelkes.jakarta.go.id/demo-simantik → Docker web :7001
# Nginx DI DALAM container sudah strip /demo-simantik — teruskan path lengkap ke sini.

upstream simantik_demo {
    server 127.0.0.1:7001;
    keepalive 8;
}

server {
    listen 80;
    server_name puspelkes.jakarta.go.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name puspelkes.jakarta.go.id;

    # ssl_certificate     /etc/ssl/certs/puspelkes.jakarta.go.id.crt;
    # ssl_certificate_key /etc/ssl/private/puspelkes.jakarta.go.id.key;

    client_max_body_size 64m;

    location /demo-simantik/ {
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        proxy_pass http://simantik_demo/demo-simantik/;
    }

    location = /demo-simantik {
        return 301 /demo-simantik/;
    }
}
