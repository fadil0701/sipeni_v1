# Reverse proxy VM (Apache httpd) — puspelkes.jakarta.go.id/demo-simantik → Docker web :7001

<VirtualHost *:443>
    ServerName puspelkes.jakarta.go.id

    SSLEngine on
    # SSLCertificateFile /etc/ssl/certs/puspelkes.jakarta.go.id.crt
    # SSLCertificateKeyFile /etc/ssl/private/puspelkes.jakarta.go.id.key

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass        /demo-simantik/ http://127.0.0.1:7001/demo-simantik/
    ProxyPassReverse /demo-simantik/ http://127.0.0.1:7001/demo-simantik/

    RedirectMatch permanent ^/demo-simantik$ /demo-simantik/
</VirtualHost>
