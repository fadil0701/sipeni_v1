# SI-MANTIK — reverse proxy /demo-simantik → Docker web :7001
#
# Salin ke VM:
#   sudo cp deploy/nginx-snippets/simantik.conf /etc/nginx/snippets/simantik.conf
#
# Lalu di server block puspelkes.jakarta.go.id (sebelum location /):
#   include /etc/nginx/snippets/simantik.conf;
#
#   sudo nginx -t && sudo systemctl reload nginx

location = /demo-simantik {
    return 301 $scheme://$host/demo-simantik/;
}

location /demo-simantik/ {
    proxy_pass http://127.0.0.1:7001/demo-simantik/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_connect_timeout 120;
    proxy_send_timeout 120;
    proxy_read_timeout 120;
    client_max_body_size 64m;
    proxy_redirect off;
}
