version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    groups:
      laravel-minor:
        patterns:
          - "laravel/*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      npm-production:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
        update-types:
          - minor
          - patch
