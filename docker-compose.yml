x-build-proxy-args: &build-proxy-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,mysql,.local}

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${DB_DATABASE:-simantik}
      MYSQL_USER: ${DB_USERNAME:-simantik}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - simantik
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u"$$MYSQL_USER" -p"$$MYSQL_PASSWORD" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  app:
    security_opt:
      - no-new-privileges:true
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        <<: *build-proxy-args
        APP_SUBPATH: ${APP_SUBPATH-/demo-simantik}
    image: simantik-app
    restart: unless-stopped
    env_file: .env
    environment:
      VIEW_CLEAR_ON_BOOT: ${VIEW_CLEAR_ON_BOOT:-1}
    volumes:
      - app_storage:/var/www/html/storage
      - ./storage/backups:/var/www/html/storage/backups
      - ./storage/logs:/var/www/html/storage/logs
      - ./.env:/var/www/html/.env:ro
      - ./public/build:/var/www/html/public/build:ro
      - ./app:/var/www/html/app:ro
      - ./config:/var/www/html/config:ro
      - ./database:/var/www/html/database:ro
      - ./routes:/var/www/html/routes:ro
      - ./resources:/var/www/html/resources:ro
      - ./docs:/var/www/html/docs:ro
      - ./bootstrap/app.php:/var/www/html/bootstrap/app.php:ro
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'php -r "exit(extension_loaded(\"pdo_mysql\")?0:1);"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - simantik

  web:
    security_opt:
      - no-new-privileges:true
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        <<: *build-proxy-args
        APP_SUBPATH: ${APP_SUBPATH-/demo-simantik}
    image: simantik-web
    restart: unless-stopped
    ports:
      - '${APP_PORT:-7001}:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public/build:/var/www/html/public/build:ro
    depends_on:
      - app
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - simantik

  queue:
    security_opt:
      - no-new-privileges:true
    image: simantik-app
    restart: unless-stopped
    env_file: .env
    command: ['php', 'artisan', 'queue:work', '--sleep=3', '--tries=3', '--timeout=120']
    volumes:
      - app_storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
      - ./public/build:/var/www/html/public/build:ro
      - ./app:/var/www/html/app:ro
      - ./config:/var/www/html/config:ro
      - ./database:/var/www/html/database:ro
      - ./routes:/var/www/html/routes:ro
      - ./resources:/var/www/html/resources:ro
      - ./docs:/var/www/html/docs:ro
      - ./bootstrap/app.php:/var/www/html/bootstrap/app.php:ro
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - simantik

networks:
  simantik:
    driver: bridge

volumes:
  mysql_data:
  app_storage:
